server:
  port: 8081

spring:
  application:
    name: jwt-auth-service

jwt:
  secret: mySecretKey12345678901234567890123456789012  # Min 32 chars for HS256
  expiration: 86400000  # 24 hours in ms

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
